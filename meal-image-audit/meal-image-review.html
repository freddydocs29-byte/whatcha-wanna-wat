function fmtSize(bytes) {
  if (!bytes) return '';
  if (bytes >= 1048576) return (bytes/1048576).toFixed(2)+' MB';
  return Math.round(bytes/1024)+' KB';
}

function toggle(id) {
  if (selected.has(id)) selected.delete(id);
  else selected.add(id);
  updateCounter();
  const card = document.getElementById('card-'+id);
  if (card) {
    card.classList.toggle('selected', selected.has(id));
    const cb = card.querySelector('input[type=checkbox]');
    if (cb) cb.checked = selected.has(id);
  }
}

function updateCounter() {
  document.getElementById('counter').textContent = `${selected.size} of ${ALL_MEALS.length} selected`;
}

function selectAllFlagged() {
  FLAGGED.forEach(m => selected.add(m.id));
  document.querySelectorAll('.card.flagged-red,.card.flagged-orange,.card.flagged-blue').forEach(c => {
    c.classList.add('selected');
    const cb = c.querySelector('input[type=checkbox]');
    if (cb) cb.checked = true;
  });
  updateCounter();
}

function clearAll() {
  selected.clear();
  document.querySelectorAll('.card').forEach(c => {
    c.classList.remove('selected');
    const cb = c.querySelector('input[type=checkbox]');
    if (cb) cb.checked = false;
  });
  updateCounter();
}

function copyList() {
  const list = Array.from(selected).map(id => {
    const m = ALL_MEALS.find(x => x.id === id);
    return m ? { id: m.id, name: m.name, currentImage: m.img } : null;
  }).filter(Boolean);
  const json = JSON.stringify(list, null, 2);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(json).then(() => {
      const btn = document.getElementById('btn-copy');
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = orig, 2000);
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = json;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
}

function cardHTML(m) {
  const borderClass = m.flagLevel ? ` flagged-${m.flagLevel}` : '';
  const sizeStr = m.fileSize ? fmtSize(m.fileSize) : '';
  const badgesHTML = m.flagLevel ? `
    <div class="badges">
      ${sizeStr ? `<span class="badge badge-size">${sizeStr}</span>` : ''}
      ${m.batch ? `<span class="badge badge-batch">${m.batch}</span>` : ''}
    </div>
    ${m.flagReason ? `<div class="flag-reason">${m.flagReason}</div>` : ''}` : '';
  return `<div class="card${borderClass}" id="card-${m.id}" onclick="toggle('${m.id}')">
    <div class="img-wrap">
      <img src="${m.img}" alt="${m.name}" loading="lazy" onerror="this.classList.add('failed')">
      <div class="img-fail">IMAGE FAILED TO LOAD</div>
      <div class="check-overlay"><input type="checkbox" onclick="event.stopPropagation();toggle('${m.id}')" id="cb-${m.id}"></div>
    </div>
    <div class="card-body">
      <div class="meal-name">${m.name}</div>
      <div class="meal-cat">${m.category}</div>
      ${badgesHTML}
    </div>
  </div>`;
}

const app = document.getElementById('app');

// Flagged section
if (FLAGGED.length > 0) {
  const h = document.createElement('div');
  h.className = 'section-header flagged';
  h.textContent = `Flagged (${FLAGGED.length})`;
  app.appendChild(h);
  const grid = document.createElement('div');
  grid.className = 'grid';
  FLAGGED.forEach(m => { grid.innerHTML += cardHTML(m); });
  app.appendChild(grid);
}

// Clean section
const h2 = document.createElement('div');
h2.className = 'section-header clean';
h2.textContent = `Clean (${CLEAN.length})`;
app.appendChild(h2);
const grid2 = document.createElement('div');
grid2.className = 'grid';
CLEAN.forEach(m => { grid2.innerHTML += cardHTML(m); });
app.appendChild(grid2);
</script>
</body>
